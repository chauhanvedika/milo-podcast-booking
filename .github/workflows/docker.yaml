name: Milo CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend
        run: docker build -t vedika20chauhan/milo-backend ./backend

      - name: Build Frontend
        run: docker build -t vedika20chauhan/milo-frontend ./frontend

      - name: Push Backend
        run: docker push vedika20chauhan/milo-backend

      - name: Push Frontend
        run: docker push vedika20chauhan/milo-frontend

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker pull vedika20chauhan/milo-backend
            docker pull vedika20chauhan/milo-frontend
            docker-compose down
            docker-compose up -d